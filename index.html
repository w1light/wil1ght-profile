<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>w1light - Esports Player</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #121212;
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }
    .avatar {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #1e90ff;
      margin-bottom: 20px;
    }
    h1 {
      margin: 10px 0;
      font-size: 2rem;
      color: #1e90ff;
    }
    p {
      margin: 5px 0;
      font-size: 1rem;
      color: #ccc;
    }
    .stats {
      margin-top: 20px;
      text-align: left;
    }
    .stats div {
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
    }
    .social {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    .social a {
      color: #1e90ff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://github.com/w1light/wil1ght-profile/blob/main/photo_2026-03-14_19-54-57.jpg">

      <div><span>Matches:</span><span>259</span></div>
    </div>
    <div class="social">

      <a href="#">Instagram</a>
      <a href="#">Twitch</a>
    </div>
  </div>
</body>
</html>
